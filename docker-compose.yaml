
services:
  otobo-ai:
    build: .
    env_file:
      - .env
    ports:
      - 8080:8000
    restart: on-failure:5
    depends_on:
      - postgres
    environment:
      LANGFUSE_PUBLIC_KEY: ${OTOBO_AI_LANGFUSE_PK}
      LANGFUSE_SECRET_KEY: ${OTOBO_AI_LANGFUSE_SK}
      LANGFUSE_HOST: ${OTOBO_AI_LANGFUSE_HOST}
    volumes:
      - chromadb-data:/chroma
      - ./rags:/code/src/rags
    command: >
      uvicorn src.server:app
      --host ${OTOBO_AI_HOST}
      --port ${OTOBO_AI_PORT}
      --loop asyncio
    networks: 
    - otobo_default

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${OTOBO_AI_PG_DB}
      POSTGRES_USER: ${OTOBO_AI_PG_USER}
      POSTGRES_PASSWORD: ${OTOBO_AI_PG_PW}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-sql:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks: 
    - otobo_default

volumes:
  chromadb-data:

  postgres-data:

networks:
  otobo_default:
    external: true
